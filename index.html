<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Familienplaner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;}
#app{max-width:900px;margin:0 auto;padding:16px 16px 80px;}
.topbar{background:white;padding:12px 16px;display:flex;align-items:center;gap:12px;border-radius:12px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.topbar-title{font-size:17px;font-weight:700;flex:1;}
.icon-btn{background:#667eea;color:white;border:none;border-radius:8px;padding:7px 12px;cursor:pointer;font-size:13px;font-weight:600;}
.icon-btn:disabled{opacity:.5;}
.search-box{background:white;border-radius:10px;padding:10px 16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.search-input{width:100%;border:1.5px solid #e0e0e0;border-radius:20px;padding:9px 14px;font-size:14px;outline:none;}
.search-input:focus{border-color:#667eea;}
.tabs{display:flex;gap:8px;margin-bottom:16px;}
.tab{padding:8px 16px;border:1.5px solid #ddd;border-radius:20px;cursor:pointer;font-size:13px;font-weight:600;background:white;color:#666;}
.tab.active{background:#667eea;color:white;border-color:#667eea;}
.month-nav{display:flex;align-items:center;justify-content:space-between;background:white;padding:14px 16px;border-radius:12px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.month-nav-title{font-size:18px;font-weight:700;}
.nav-btn{background:transparent;border:1px solid #ddd;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:16px;}
.nav-btn:hover{background:#f0f0f0;}
.month-grid{background:white;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.month-days-header{display:grid;grid-template-columns:repeat(7,1fr);background:#667eea;}
.month-days-header div{text-align:center;padding:8px 0;font-size:11px;font-weight:700;color:white;}
.month-grid-cells{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:#eee;}
.cal-cell{background:white;min-height:80px;padding:5px;cursor:pointer;transition:background .1s;}
.cal-cell:hover{background:#f8f8ff;}
.cal-cell.other{opacity:.3;}
.cal-cell.weekend{background:#fafafa;}
.cal-cell.today .day-num{background:#667eea;color:white;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;}
.cal-cell.selected{background:#f0eeff;}
.day-num{font-size:13px;font-weight:600;width:24px;height:24px;display:flex;align-items:center;justify-content:center;margin-bottom:2px;}
.cell-events{display:flex;flex-direction:column;gap:2px;}
.cell-pill{font-size:9px;padding:2px 4px;border-radius:3px;color:white;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;line-height:1.4;}
.cell-more{font-size:9px;color:#667eea;font-weight:700;}
.agenda{display:flex;flex-direction:column;gap:4px;}
.agenda-month-label{font-size:14px;font-weight:700;color:#667eea;padding:16px 0 6px;border-bottom:2px solid #667eea;margin-bottom:8px;}
.agenda-day-row{display:flex;gap:12px;background:white;border-radius:10px;padding:12px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.agenda-day-left{min-width:44px;text-align:center;}
.day-number{font-size:22px;font-weight:800;line-height:1;color:#333;}
.day-number.today-num{background:#667eea;color:white;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:16px;margin:0 auto;}
.day-weekday{font-size:10px;font-weight:700;color:#999;margin-top:2px;}
.agenda-events{flex:1;display:flex;flex-direction:column;gap:6px;}
.agenda-event{padding:9px 12px;border-radius:8px;cursor:pointer;}
.ev-title{font-size:14px;font-weight:600;color:white;}
.ev-sub{font-size:11px;color:rgba(255,255,255,.85);margin-top:2px;}
.week-grid{background:white;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.week-days-header{display:grid;grid-template-columns:44px repeat(7,1fr);border-bottom:1px solid #eee;}
.week-day-col{text-align:center;padding:8px 2px;font-size:11px;}
.week-day-name{font-weight:700;color:#888;}
.week-day-num{font-size:18px;font-weight:800;line-height:1.2;}
.week-day-num.today{background:#667eea;color:white;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;margin:2px auto 0;font-size:14px;}
.week-body{display:grid;grid-template-columns:44px repeat(7,1fr);max-height:600px;overflow-y:auto;}
.time-gutter{display:flex;flex-direction:column;}
.time-cell{height:50px;display:flex;align-items:flex-start;justify-content:flex-end;padding-right:6px;}
.time-text{font-size:9px;color:#bbb;transform:translateY(-5px);}
.week-col{border-left:1px solid #f0f0f0;position:relative;}
.hour-tick{position:absolute;left:0;right:0;border-top:1px solid #f5f5f5;}
.week-event-block{position:absolute;left:2px;right:2px;border-radius:5px;padding:3px 6px;font-size:10px;color:white;overflow:hidden;cursor:pointer;font-weight:600;line-height:1.3;}
.now-marker{position:absolute;left:0;right:0;height:2px;background:#ea4335;z-index:5;}
.now-marker::before{content:'';position:absolute;left:-4px;top:-4px;width:8px;height:8px;border-radius:50%;background:#ea4335;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #eee;display:flex;max-width:900px;margin:0 auto;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 8px;cursor:pointer;border:none;background:transparent;color:#999;font-size:10px;gap:2px;}
.nav-item.active{color:#667eea;}
.nav-icon{font-size:22px;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;}
.modal-bg.open{display:flex;}
.modal{background:white;border-radius:20px 20px 0 0;width:100%;max-width:900px;margin:0 auto;padding:20px 20px 40px;max-height:85vh;overflow-y:auto;}
.modal-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 20px;}
.modal h2{font-size:18px;font-weight:700;margin-bottom:20px;}
.form-row{margin-bottom:14px;}
.form-label{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;margin-bottom:5px;display:block;}
.form-control{width:100%;padding:11px 13px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:14px;outline:none;}
.form-control:focus{border-color:#667eea;}
.colors-row{display:flex;gap:8px;flex-wrap:wrap;}
.color-dot{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent;}
.color-dot.sel{border-color:#222;transform:scale(1.1);}
.btn-row{display:flex;gap:10px;margin-top:20px;}
.btn-save{flex:1;background:#667eea;color:white;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;}
.btn-cancel{flex:1;background:#f0f0f0;border:none;border-radius:10px;padding:14px;font-size:15px;cursor:pointer;}
.detail-bar{height:5px;border-radius:3px;margin-bottom:16px;}
.detail-title{font-size:22px;font-weight:800;margin-bottom:16px;}
.detail-row{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px;font-size:14px;color:#444;}
.detail-icon{font-size:18px;width:24px;text-align:center;flex-shrink:0;}
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);background:#222;color:white;padding:10px 22px;border-radius:24px;font-size:13px;font-weight:600;z-index:500;display:none;white-space:nowrap;}
.toast.show{display:block;}
.google-banner{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:14px 16px;border-radius:12px;margin-bottom:12px;display:flex;align-items:center;gap:12px;}
.google-banner p{font-size:13px;line-height:1.5;flex:1;}
.google-banner-btn{background:white;color:#667eea;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <span class="topbar-title">📅 Familienplaner</span>
    <button class="icon-btn" id="sync-btn" onclick="startGoogleSync()">🔗 Google Sync</button>
  </div>

  <div class="google-banner" id="google-banner">
    <p>🔗 Mit Google verbinden um echte Termine zu laden</p>
    <button class="google-banner-btn" onclick="startGoogleSync()">Verbinden</button>
  </div>

  <div class="search-box">
    <input type="text" class="search-input" id="search-input" placeholder="🔍 Termine suchen..." oninput="doSearch()">
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-agenda" onclick="setView('agenda')">Übersicht</button>
    <button class="tab" id="tab-week" onclick="setView('week')">Woche</button>
    <button class="tab" id="tab-month" onclick="setView('month')">Monat</button>
  </div>

  <div class="month-nav">
    <button class="nav-btn" onclick="navigate(-1)">◀</button>
    <span class="month-nav-title" id="nav-title">Juli 2026</span>
    <button class="nav-btn" onclick="navigate(1)">▶</button>
  </div>

  <div id="view-content"></div>

  <nav class="bottom-nav">
    <button class="nav-item active" id="nav-agenda" onclick="setView('agenda')"><span class="nav-icon">☰</span>Übersicht</button>
    <button class="nav-item" id="nav-week" onclick="setView('week')"><span class="nav-icon">📊</span>Woche</button>
    <button class="nav-item" id="nav-month" onclick="setView('month')"><span class="nav-icon">📅</span>Monat</button>
    <button class="nav-item" id="nav-add" onclick="openAdd()"><span class="nav-icon">➕</span>Neu</button>
  </nav>
</div>

<!-- ADD MODAL -->
<div class="modal-bg" id="add-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modal-h">Neuer Termin</h2>
    <div class="form-row"><label class="form-label">Titel</label><input type="text" class="form-control" id="f-title" placeholder="z.B. Zahnarzt"></div>
    <div class="form-row"><label class="form-label">Datum</label><input type="date" class="form-control" id="f-date"></div>
    <div class="form-row" id="f-time-row">
      <label class="form-label">Uhrzeit (von – bis)</label>
      <div style="display:flex;gap:8px;"><input type="time" class="form-control" id="f-from"><input type="time" class="form-control" id="f-to"></div>
    </div>
    <div class="form-row"><label class="form-label">Ganztägig</label>
      <select class="form-control" id="f-allday" onchange="document.getElementById('f-time-row').style.display=this.value=='yes'?'none':'block'">
        <option value="no">Nein</option><option value="yes">Ja</option>
      </select>
    </div>
    <div class="form-row"><label class="form-label">Notiz</label><textarea class="form-control" id="f-note" rows="2"></textarea></div>
    <div class="form-row"><label class="form-label">Farbe</label><div class="colors-row" id="colors-row"></div></div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeAdd()">Abbrechen</button>
      <button class="btn-save" onclick="saveEvent()">Speichern</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-bg" id="detail-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="detail-body"></div>
    <div class="btn-row">
      <button class="btn-cancel" id="del-btn" onclick="deleteEvent()" style="background:#ffebee;color:#c62828;">🗑️ Löschen</button>
      <button class="btn-cancel" onclick="closeDetail()">Schließen</button>
      <button class="btn-save" id="edit-btn" onclick="startEdit()" style="flex:0.7;">✏️</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- NEUE Google Identity Services Library -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<!-- gapi nur für Calendar API (NICHT für Auth) -->
<script src="https://apis.google.com/js/api.js"></script>

<script>
const CLIENT_ID = '547645477153-s1beu2vqltacv5f9e1162eereb7t0aeh.apps.googleusercontent.com';
const API_KEY   = 'AIzaSyD1noiwnob0f4zWNtyPcJbcVAN54YJvw2w';
const SCOPES    = 'https://www.googleapis.com/auth/calendar.readonly';

const COLORS = ['#667eea','#a855f7','#ef4444','#f97316','#eab308','#22c55e','#14b8a6','#ec4899','#6366f1','#78716c'];
const DAYS_L = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
const DAYS_S = ['So','Mo','Di','Mi','Do','Fr','Sa'];
const MONTHS = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];

let events    = JSON.parse(localStorage.getItem('fp_events')||'[]');
let currentView = 'agenda';
let viewDate    = new Date();
let selDate     = new Date().toISOString().slice(0,10);
let selColor    = COLORS[0];
let editId      = null;
let detailId    = null;
let tokenClient = null;
let accessToken = null;

// ─── NEUE GOOGLE AUTH (GIS) ───────────────────────────────
function startGoogleSync() {
  // Initialisiere gapi.client zuerst
  gapi.load('client', async () => {
    await gapi.client.init({
      apiKey: API_KEY,
      discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest'],
    });

    // Dann Token anfordern via GIS
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPES,
      callback: (tokenResponse) => {
        if (tokenResponse.error) {
          toast('❌ Login Fehler: ' + tokenResponse.error);
          return;
        }
        accessToken = tokenResponse.access_token;
        gapi.client.setToken({ access_token: accessToken });
        loadAllCalendars();
      },
    });

    tokenClient.requestAccessToken({ prompt: 'consent' });
  });
}

// ─── KALENDER LADEN ───────────────────────────────────────
async function loadAllCalendars() {
  toast('📅 Lade alle Kalender...');
  document.getElementById('google-banner').innerHTML =
    '<p style="font-size:13px;">⏳ Termine werden geladen (2015–2035)...</p>';
  document.getElementById('sync-btn').disabled = true;

  try {
    const calList = await gapi.client.calendar.calendarList.list();
    const cals = calList.result.items || [];
    const timeMin = '2015-01-01T00:00:00Z';
    const timeMax = '2035-12-31T23:59:59Z';
    const googleEvents = [];

    for (const cal of cals) {
      try {
        let pt = null;
        do {
          const p = {
            calendarId: cal.id,
            timeMin, timeMax,
            singleEvents: true,
            orderBy: 'startTime',
            maxResults: 2500,
          };
          if (pt) p.pageToken = pt;
          const r = await gapi.client.calendar.events.list(p);
          pt = r.result.nextPageToken || null;
          (r.result.items || []).forEach(item => {
            if (!item.start) return;
            const allDay = !!item.start.date;
            const start  = item.start.dateTime || item.start.date;
            const end    = item.end ? (item.end.dateTime || item.end.date) : start;
            const sd = new Date(start), ed = new Date(end);
            googleEvents.push({
              id:      item.id || ('g_' + Math.random()),
              date:    start.slice(0,10),
              endDate: end.slice(0,10),
              title:   item.summary || '(kein Titel)',
              time:    allDay ? '' : sd.toTimeString().slice(0,5),
              endTime: allDay ? '' : ed.toTimeString().slice(0,5),
              allDay,
              color:   cal.backgroundColor || '#667eea',
              calName: cal.summary,
              note:    item.description || '',
              source:  'google',
            });
          });
        } while (pt);
      } catch(e) { console.warn('Cal error', cal.summary, e); }
    }

    // Merge: lokale Einträge behalten, Google-Events ersetzen
    events = [
      ...events.filter(e => e.source !== 'google'),
      ...googleEvents,
    ];
    events.sort((a,b) => a.date.localeCompare(b.date) || (a.time||'').localeCompare(b.time||''));
    localStorage.setItem('fp_events', JSON.stringify(events));

    document.getElementById('google-banner').innerHTML =
      `<p style="font-size:13px;">✅ ${googleEvents.length} Termine aus Google geladen</p>
       <button class="google-banner-btn" onclick="startGoogleSync()">🔄 Sync</button>`;
    document.getElementById('sync-btn').textContent = '🔄 Sync';
    document.getElementById('sync-btn').disabled = false;

    render();
    toast('✅ ' + googleEvents.length + ' Termine geladen!');
  } catch(e) {
    toast('❌ Fehler: ' + (e.message || JSON.stringify(e)));
    document.getElementById('sync-btn').disabled = false;
  }
}

// ─── RENDER ──────────────────────────────────────────────
function render() {
  const d = viewDate;
  document.getElementById('nav-title').textContent = MONTHS[d.getMonth()] + ' ' + d.getFullYear();
  ['agenda','week','month'].forEach(v => {
    document.getElementById('tab-'+v).classList.toggle('active', v===currentView);
    document.getElementById('nav-'+v).classList.toggle('active', v===currentView);
  });
  if      (currentView==='agenda') renderAgenda();
  else if (currentView==='week')   renderWeek();
  else                             renderMonth();
}

function eventsOn(ds) {
  return events.filter(e => {
    if (e.date === ds) return true;
    if (e.allDay && e.endDate > ds && e.date <= ds) return true;
    return false;
  });
}

function renderAgenda() {
  const todayStr = new Date().toISOString().slice(0,10);
  const dateMap = {};
  events.forEach(e => { if(!dateMap[e.date]) dateMap[e.date]=[]; dateMap[e.date].push(e); });
  const dates = Object.keys(dateMap).sort();
  if (!dates.length) {
    document.getElementById('view-content').innerHTML =
      '<div style="text-align:center;padding:48px;color:#ccc;font-size:14px;">Noch keine Termine.<br>Verbinde Google Kalender!</div>';
    return;
  }
  let lastMonth='', html='<div class="agenda">';
  dates.forEach(ds => {
    const d = new Date(ds+'T00:00:00');
    const mk = MONTHS[d.getMonth()]+' '+d.getFullYear();
    if (mk!==lastMonth) { html+=`<div class="agenda-month-label">${mk}</div>`; lastMonth=mk; }
    const evs = dateMap[ds].sort((a,b)=>(a.time||'').localeCompare(b.time||''));
    const isToday = ds===todayStr;
    html += `<div class="agenda-day-row" id="agd-${ds}">
      <div class="agenda-day-left">
        <div class="day-number${isToday?' today-num':''}">${d.getDate()}</div>
        <div class="day-weekday">${DAYS_S[d.getDay()]}</div>
      </div>
      <div class="agenda-events">
        ${evs.map(e=>`<div class="agenda-event" style="background:${e.color};" onclick="showDetail('${e.id}')">
          <div class="ev-title">${e.title}</div>
          <div class="ev-sub">${e.allDay?'Ganztägig':e.time+(e.endTime?' – '+e.endTime:'')} · ${e.calName||'Lokal'}</div>
        </div>`).join('')}
      </div>
    </div>`;
  });
  html += '</div>';
  document.getElementById('view-content').innerHTML = html;
  setTimeout(()=>{
    const el = document.getElementById('agd-'+todayStr);
    if (el) el.scrollIntoView({behavior:'smooth',block:'center'});
  },80);
}

function renderMonth() {
  const year=viewDate.getFullYear(), month=viewDate.getMonth();
  const today=new Date().toISOString().slice(0,10);
  const first=(new Date(year,month,1).getDay()+6)%7;
  const dInM=new Date(year,month+1,0).getDate();
  let html=`<div class="month-grid"><div class="month-days-header">`;
  ['Mo','Di','Mi','Do','Fr','Sa','So'].forEach(d=>html+=`<div>${d}</div>`);
  html+=`</div><div class="month-grid-cells">`;
  const prevD=new Date(year,month,0).getDate();
  for(let i=first-1;i>=0;i--) html+=`<div class="cal-cell other"><div class="day-num">${prevD-i}</div></div>`;
  for(let d=1;d<=dInM;d++){
    const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow=(new Date(year,month,d).getDay()+6)%7;
    const wknd=dow>=5, isT=ds===today, isSel=ds===selDate;
    const evs=eventsOn(ds);
    html+=`<div class="cal-cell${wknd?' weekend':''}${isT?' today':''}${isSel?' selected':''}" onclick="pickDate('${ds}')">
      <div class="day-num">${d}</div>
      <div class="cell-events">
        ${evs.slice(0,2).map(e=>`<div class="cell-pill" style="background:${e.color};">${e.title}</div>`).join('')}
        ${evs.length>2?`<div class="cell-more">+${evs.length-2}</div>`:''}
      </div>
    </div>`;
  }
  const rem=(7-((first+dInM)%7))%7;
  for(let d=1;d<=rem;d++) html+=`<div class="cal-cell other"><div class="day-num">${d}</div></div>`;
  html+='</div></div>';
  document.getElementById('view-content').innerHTML=html;
}

function renderWeek() {
  const mon=new Date(viewDate);
  const dow=mon.getDay(); mon.setDate(mon.getDate()-(dow===0?6:dow-1));
  const today=new Date().toISOString().slice(0,10);
  const now=new Date();
  const days=[];
  for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(d.getDate()+i);days.push(d);}
  let html=`<div class="week-grid"><div class="week-days-header"><div></div>`;
  days.forEach(d=>{
    const ds=d.toISOString().slice(0,10), isT=ds===today;
    html+=`<div class="week-day-col"><div class="week-day-name">${DAYS_S[d.getDay()]}</div>
      <div class="week-day-num${isT?' today':''}" onclick="pickDate('${ds}')">${d.getDate()}</div></div>`;
  });
  html+=`</div><div class="week-body"><div class="time-gutter">`;
  for(let h=0;h<24;h++) html+=`<div class="time-cell"><span class="time-text">${h===0?'':String(h).padStart(2,'0')}</span></div>`;
  html+='</div>';
  days.forEach(d=>{
    const ds=d.toISOString().slice(0,10);
    const evs=events.filter(e=>e.date===ds&&!e.allDay&&e.time);
    html+=`<div class="week-col" style="height:1200px;">`;
    for(let h=0;h<24;h++) html+=`<div class="hour-tick" style="top:${h*50}px;"></div>`;
    evs.forEach(e=>{
      const [sh,sm]=(e.time||'00:00').split(':').map(Number);
      const [eh,em]=(e.endTime||`${Math.min(sh+1,23)}:00`).split(':').map(Number);
      const top=sh*50+Math.round(sm*50/60);
      const ht=Math.max((eh*50+Math.round(em*50/60))-top,20);
      html+=`<div class="week-event-block" style="top:${top}px;height:${ht}px;background:${e.color};" onclick="showDetail('${e.id}')">${e.time} ${e.title}</div>`;
    });
    if(ds===today){const np=now.getHours()*50+Math.round(now.getMinutes()*50/60);html+=`<div class="now-marker" style="top:${np}px;"></div>`;}
    html+='</div>';
  });
  html+='</div></div>';
  document.getElementById('view-content').innerHTML=html;
  setTimeout(()=>{const wb=document.querySelector('.week-body');if(wb)wb.scrollTop=7*50;},50);
}

// ─── NAVIGATION ──────────────────────────────────────────
function navigate(dir){
  if(currentView==='month') viewDate.setMonth(viewDate.getMonth()+dir);
  else if(currentView==='week') viewDate.setDate(viewDate.getDate()+7*dir);
  else viewDate.setMonth(viewDate.getMonth()+dir);
  render();
}
function setView(v){
  currentView=v;
  if(v==='week'){
    const mon=new Date(viewDate); const dow=mon.getDay(); mon.setDate(mon.getDate()-(dow===0?6:dow-1)); viewDate=mon;
  }
  render();
}
function pickDate(ds){
  selDate=ds; viewDate=new Date(ds+'T00:00:00');
  if(currentView==='month') setView('agenda');
  else render();
}

// ─── SEARCH ──────────────────────────────────────────────
function doSearch(){
  const q=document.getElementById('search-input').value.toLowerCase().trim();
  if(!q){render();return;}
  const res=events.filter(e=>e.title.toLowerCase().includes(q)||(e.note||'').toLowerCase().includes(q));
  const todayStr=new Date().toISOString().slice(0,10);
  let html='<div class="agenda">';
  res.forEach(e=>{
    const d=new Date(e.date+'T00:00:00');
    html+=`<div class="agenda-day-row" onclick="showDetail('${e.id}')">
      <div class="agenda-day-left">
        <div class="day-number" style="font-size:14px;">${d.getDate()} ${MONTHS[d.getMonth()].slice(0,3)}</div>
        <div class="day-weekday">${d.getFullYear()}</div>
      </div>
      <div class="agenda-events">
        <div class="agenda-event" style="background:${e.color};">
          <div class="ev-title">${e.title}</div>
          <div class="ev-sub">${e.allDay?'Ganztägig':e.time} · ${e.calName||'Lokal'}</div>
        </div>
      </div>
    </div>`;
  });
  html+=res.length?'</div>':'<div style="text-align:center;padding:32px;color:#ccc;">Keine Ergebnisse</div>';
  document.getElementById('view-content').innerHTML=html;
}

// ─── ADD / EDIT ───────────────────────────────────────────
function openAdd(){
  editId=null;
  document.getElementById('modal-h').textContent='Neuer Termin';
  document.getElementById('f-title').value='';
  document.getElementById('f-date').value=selDate||new Date().toISOString().slice(0,10);
  document.getElementById('f-from').value='10:00';
  document.getElementById('f-to').value='11:00';
  document.getElementById('f-allday').value='no';
  document.getElementById('f-note').value='';
  document.getElementById('f-time-row').style.display='block';
  selColor=COLORS[0]; buildColors();
  document.getElementById('add-modal').classList.add('open');
}
function buildColors(){
  document.getElementById('colors-row').innerHTML=COLORS.map(c=>
    `<div class="color-dot${c===selColor?' sel':''}" style="background:${c};" onclick="selColor='${c}';buildColors()"></div>`).join('');
}
function closeAdd(){document.getElementById('add-modal').classList.remove('open');}
function saveEvent(){
  const title=document.getElementById('f-title').value.trim();
  const date=document.getElementById('f-date').value;
  if(!title||!date){toast('⚠️ Titel und Datum fehlen!');return;}
  const allDay=document.getElementById('f-allday').value==='yes';
  const ev={
    id:editId||('loc_'+Date.now()), date, endDate:date, title,
    time:allDay?'':document.getElementById('f-from').value,
    endTime:allDay?'':document.getElementById('f-to').value,
    allDay, color:selColor, calName:'Mein Kalender',
    note:document.getElementById('f-note').value.trim(), source:'local'
  };
  if(editId){const i=events.findIndex(e=>e.id===editId);events[i]=ev;}
  else events.push(ev);
  events.sort((a,b)=>a.date.localeCompare(b.date)||(a.time||'').localeCompare(b.time||''));
  localStorage.setItem('fp_events',JSON.stringify(events));
  closeAdd(); render(); toast('✅ Gespeichert');
}
function startEdit(){
  const ev=events.find(e=>e.id===detailId);
  if(!ev||ev.source==='google'){toast('Google-Termine können nur in Google Kalender bearbeitet werden');return;}
  closeDetail(); editId=ev.id;
  document.getElementById('modal-h').textContent='Bearbeiten';
  document.getElementById('f-title').value=ev.title;
  document.getElementById('f-date').value=ev.date;
  document.getElementById('f-from').value=ev.time||'';
  document.getElementById('f-to').value=ev.endTime||'';
  document.getElementById('f-allday').value=ev.allDay?'yes':'no';
  document.getElementById('f-note').value=ev.note||'';
  document.getElementById('f-time-row').style.display=ev.allDay?'none':'block';
  selColor=ev.color; buildColors();
  document.getElementById('add-modal').classList.add('open');
}
function deleteEvent(){
  if(!detailId)return;
  const ev=events.find(e=>e.id===detailId);
  if(ev&&ev.source==='google'){toast('Google-Termine hier nicht löschbar');return;}
  events=events.filter(e=>e.id!==detailId);
  localStorage.setItem('fp_events',JSON.stringify(events));
  closeDetail(); render(); toast('🗑️ Gelöscht');
}

// ─── DETAIL ───────────────────────────────────────────────
function showDetail(id){
  detailId=id;
  const ev=events.find(e=>e.id===id); if(!ev)return;
  const d=new Date(ev.date+'T00:00:00');
  const isLocal=ev.source!=='google';
  document.getElementById('detail-body').innerHTML=`
    <div class="detail-bar" style="background:${ev.color};"></div>
    <div class="detail-title">${ev.title}</div>
    <div class="detail-row"><span class="detail-icon">📅</span>${DAYS_L[d.getDay()]}, ${d.getDate()}. ${MONTHS[d.getMonth()]} ${d.getFullYear()}</div>
    <div class="detail-row"><span class="detail-icon">🕐</span>${ev.allDay?'Ganztägig':(ev.time+(ev.endTime?' – '+ev.endTime:''))}</div>
    <div class="detail-row"><div style="width:12px;height:12px;border-radius:50%;background:${ev.color};flex-shrink:0;margin-top:2px;"></div>${ev.calName||'Lokal'}</div>
    ${ev.note?`<div class="detail-row"><span class="detail-icon">📝</span><span>${ev.note}</span></div>`:''}
  `;
  document.getElementById('del-btn').style.display=isLocal?'flex':'none';
  document.getElementById('edit-btn').style.display=isLocal?'flex':'none';
  document.getElementById('detail-modal').classList.add('open');
}
function closeDetail(){document.getElementById('detail-modal').classList.remove('open');}

// ─── TOAST ────────────────────────────────────────────────
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2800);
}

// ─── KEYBOARD + SWIPE ────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeAdd();closeDetail();}
  if(e.key==='ArrowLeft'&&document.activeElement.tagName!=='INPUT')navigate(-1);
  if(e.key==='ArrowRight'&&document.activeElement.tagName!=='INPUT')navigate(1);
});
let tx=0,ty=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  if(document.getElementById('add-modal').classList.contains('open'))return;
  if(document.getElementById('detail-modal').classList.contains('open'))return;
  const dx=e.changedTouches[0].clientX-tx, dy=Math.abs(e.changedTouches[0].clientY-ty);
  if(Math.abs(dx)>70&&dy<60)navigate(dx<0?1:-1);
},{passive:true});

// ─── INIT ─────────────────────────────────────────────────
render();
</script>
</body>
</html>
